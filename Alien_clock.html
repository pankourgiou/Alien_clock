<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Timepiece</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@200;400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #06080d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background: radial-gradient(ellipse at 50% 40%, #0d1520 0%, #06080d 65%);
    z-index:-1;
  }
  /* Floating particles */
  .particles {
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .particle {
    position:absolute;
    width:2px; height:2px;
    background: #1affe0;
    border-radius:50%;
    opacity:0;
    animation: floatUp var(--dur) var(--delay) ease-in infinite;
  }
  @keyframes floatUp {
    0%   { opacity:0; transform: translateY(0) scale(1); }
    20%  { opacity:0.6; }
    80%  { opacity:0.2; }
    100% { opacity:0; transform: translateY(-100vh) scale(0.3); }
  }
  .title {
    font-family: 'Share Tech Mono', monospace;
    color: #1affe0;
    font-size: 0.72rem;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    margin-bottom: 30px;
    text-shadow: 0 0 14px rgba(26,255,224,0.7);
    z-index:10;
  }
  .clock-wrapper {
    position: relative;
    width: 530px;
    height: 530px;
    z-index:10;
  }
  .clock-layer {
    position: absolute;
    border-radius: 50%;
    overflow: hidden;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }

  .vignette {
    position:absolute; width:530px; height:530px; top:0; left:0;
    border-radius:50%;
    background: radial-gradient(circle,
      rgba(6,8,13,0.0) 0%,
      rgba(6,8,13,0.15) 38%,
      rgba(6,8,13,0.65) 72%,
      rgba(6,8,13,0.92) 100%);
    pointer-events:none; z-index:5;
  }
  .ring-outer {
    position:absolute; width:530px; height:530px; top:0; left:0;
    border-radius:50%;
    border: 1.5px solid rgba(26,255,224,0.4);
    box-shadow:
      0 0 20px rgba(26,255,224,0.15),
      0 0 60px rgba(26,255,224,0.06),
      inset 0 0 20px rgba(26,255,224,0.06);
    pointer-events:none; z-index:6;
    animation: ringPulse 4s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { box-shadow: 0 0 20px rgba(26,255,224,0.15), inset 0 0 20px rgba(26,255,224,0.06); }
    50%      { box-shadow: 0 0 35px rgba(26,255,224,0.30), inset 0 0 35px rgba(26,255,224,0.12); }
  }
  .ring-mid {
    position:absolute; width:464px; height:464px; top:33px; left:33px;
    border-radius:50%;
    border: 1px solid rgba(180,80,255,0.18);
    pointer-events:none; z-index:6;
  }
  .clock-svg {
    position:absolute; top:0; left:0;
    width:530px; height:530px; z-index:10;
  }
  .center-core {
    position:absolute;
    width:20px; height:20px;
    background: radial-gradient(circle, #ffffff 0%, #1affe0 40%, #0a5550 100%);
    border-radius:50%;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:
      0 0 8px rgba(26,255,224,1),
      0 0 20px rgba(26,255,224,0.7),
      0 0 45px rgba(26,255,224,0.3);
    z-index:20;
    animation: corePulse 2s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%,100% { box-shadow: 0 0 8px rgba(26,255,224,1), 0 0 20px rgba(26,255,224,0.7), 0 0 45px rgba(26,255,224,0.3); }
    50%      { box-shadow: 0 0 12px rgba(26,255,224,1), 0 0 30px rgba(26,255,224,0.9), 0 0 65px rgba(26,255,224,0.5); }
  }
  .bottom-panel {
    margin-top: 24px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    z-index:10;
  }
  .digital-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    color: #1affe0;
    letter-spacing: 0.18em;
    text-shadow: 0 0 18px rgba(26,255,224,0.8);
  }
  .date-line {
    font-size: 0.68rem;
    color: #2a8880;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    font-family: 'Exo 2', sans-serif;
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="title">&#9632; Xenon Timecraft &#9632;</div>

<div class="clock-wrapper">
  <div class="clock-layer layer-1"></div>
  <div class="clock-layer layer-2"></div>
  <div class="vignette"></div>
  <div class="ring-outer"></div>
  <div class="ring-mid"></div>

  <svg class="clock-svg" viewBox="0 0 530 530" id="clockSvg">
    <defs>
      <filter id="glow-hour">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-min">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-sec">
        <feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="markers"></g>
    <!-- Hour: thick cyan -->
    <line id="hourHand" x1="265" y1="265" x2="265" y2="150"
      stroke="#1affe0" stroke-width="7" stroke-linecap="round"
      filter="url(#glow-hour)"/>
    <!-- Minute: thinner violet -->
    <line id="minuteHand" x1="265" y1="265" x2="265" y2="105"
      stroke="#b44aff" stroke-width="4" stroke-linecap="round"
      filter="url(#glow-min)"/>
    <!-- Second: ultra thin hot pink -->
    <line id="secondHand" x1="265" y1="290" x2="265" y2="88"
      stroke="#ff3aaa" stroke-width="1.5" stroke-linecap="round"
      filter="url(#glow-sec)"/>
  </svg>
  <div class="center-core"></div>
</div>

<div class="bottom-panel">
  <div class="digital-time" id="digitalTime">--:--:--</div>
  <div class="date-line" id="dateLine"></div>
</div>

<script>
// Particles
const pc = document.getElementById('particles');
for(let i=0;i<40;i++){
  const d=document.createElement('div');
  d.className='particle';
  d.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*20}%;--dur:${6+Math.random()*12}s;--delay:${Math.random()*10}s;`;
  if(Math.random()>0.5) d.style.background='#b44aff';
  pc.appendChild(d);
}

const cx=265,cy=265;
const mg=document.getElementById('markers');
for(let i=0;i<60;i++){
  const a=i*6*Math.PI/180;
  const isMaj=i%5===0;
  const r1=242,r2=isMaj?220:232;
  const x1=cx+r1*Math.sin(a),y1=cy-r1*Math.cos(a);
  const x2=cx+r2*Math.sin(a),y2=cy-r2*Math.cos(a);
  const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);
  ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
  ln.setAttribute('stroke',isMaj?'rgba(26,255,224,0.8)':'rgba(26,255,224,0.2)');
  ln.setAttribute('stroke-width',isMaj?'3':'1');
  ln.setAttribute('stroke-linecap','round');
  mg.appendChild(ln);
  if(isMaj){
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',cx+207*Math.sin(a));
    dot.setAttribute('cy',cy-207*Math.cos(a));
    dot.setAttribute('r','3.5');
    dot.setAttribute('fill','rgba(26,255,224,0.55)');
    mg.appendChild(dot);
  }
}

function rot(el,deg){el.setAttribute('transform',`rotate(${deg},${cx},${cy})`);}
function tick(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
  rot(document.getElementById('secondHand'),(s+ms/1000)*6);
  rot(document.getElementById('minuteHand'),(m+s/60)*6);
  rot(document.getElementById('hourHand'),((h%12)+m/60)*30);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('digitalTime').textContent=`${p(h)}:${p(m)}:${p(s)}`;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateLine').textContent=`${days[now.getDay()]} · ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
tick();
setInterval(tick,50);
</script>
</body>
</html>
